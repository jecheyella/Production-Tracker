<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tickets | Production Equipment Tracker</title>

<link rel="stylesheet" href="style.css">

<script>
(function () {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark") {
        document.documentElement.classList.add("dark");
    }
})();
</script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

</head>

<body>

<div class="layout">

<!-- ================= SIDEBAR ================= -->

<aside class="sidebar">

<nav class="sidebar-nav">

<a href="Profile.html">
<span class="material-symbols-rounded">account_circle</span>
<span class="label">Profile</span>
</a>


<a href="Dashboard.html">
<span class="material-symbols-rounded">dashboard</span>
<span class="label">Dashboard</span>
</a>

<a href="Inventory.html">
<span class="material-symbols-rounded">inventory_2</span>
<span class="label">Inventory</span>
</a>

<a href="Tickets.html" >
<span class="material-symbols-rounded">confirmation_number</span>
<span class="label">Tickets</span>
</a>

<a href="Maintenance.html" class="active">
<span class="material-symbols-rounded">build</span>
<span class="label">Maintenance</span>
</a>

<a href="History.html">
<span class="material-symbols-rounded">history</span>
<span class="label">History</span>
</a>

<a href="Settings.html">
<span class="material-symbols-rounded">settings</span>
<span class="label">Settings</span>
</a>

</nav>

</aside>

<!-- ================= MAIN ================= -->

<main class="main">

<header class="header">

<div class="header-center">

<img id="logo" src="logo-light.png" class="logo">

<h1>Maintenance Tickets</h1>

</div>

</header>

<section class="maintenance">

<div class="inventory-header">

<h2>Maintenance Progress</h2>

</div>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>Equipment</th>
<th>Reporter</th>
<th>Issue</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="maintenanceTable">

</tbody>

</table>

</div>

</section>
<script type="module" src="autho.js"></script>
<script type="module" src="UI.js"></script>
<script type="module" src="Maintenance.js"></script>
<script type="module" src="firebase-config.js"></script>




</main>
</div>
</body>
</html>
